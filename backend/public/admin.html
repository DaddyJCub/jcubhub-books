<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - JcubHub Books</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Admin-specific styles */
    .admin-container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      margin-bottom: 30px;
    }

    .admin-title {
      font-size: 1.5rem;
      font-weight: 600;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .admin-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .admin-user {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Login form */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-2xl);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }

    .login-title {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 30px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 25px;
      text-align: center;
      transition: all var(--transition-base);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* Requests table */
    .requests-section {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 25px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
    }

    .filter-tab {
      padding: 8px 16px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all var(--transition-base);
    }

    .filter-tab.active {
      background: var(--gradient-primary);
      border-color: transparent;
      color: var(--text-primary);
    }

    .filter-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
    }

    .requests-table {
      width: 100%;
      border-collapse: collapse;
    }

    .requests-table th,
    .requests-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    .requests-table th {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .requests-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .status-approved { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .status-searching { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
    .status-downloading { background: rgba(14, 165, 233, 0.2); color: #0ea5e9; }
    .status-completed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .status-unavailable { background: rgba(107, 114, 128, 0.2); color: #6b7280; }

    .action-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all var(--transition-base);
      margin-right: 5px;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .action-btn.primary {
      background: var(--gradient-primary);
      border-color: transparent;
      color: var(--text-primary);
    }

    .cwa-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .cwa-badge.unavailable {
      background: rgba(107, 114, 128, 0.2);
      color: #6b7280;
    }

    /* Request detail modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-base);
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.5rem;
      padding: 5px;
    }

    .detail-row {
      display: flex;
      margin-bottom: 15px;
    }

    .detail-label {
      width: 120px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .detail-value {
      flex: 1;
      color: var(--text-primary);
    }

    .status-select {
      padding: 10px 15px;
      background: var(--bg-input);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      width: 100%;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .status-select option {
      background: #1a1a2e;
    }

    .history-list {
      margin-top: 20px;
      border-top: 1px solid var(--border-light);
      padding-top: 20px;
    }

    .history-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      padding-left: 20px;
      position: relative;
    }

    .history-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    .history-time {
      width: 150px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .history-status {
      font-weight: 500;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 15px 25px;
      box-shadow: var(--shadow-lg);
      z-index: var(--z-toast);
      transform: translateY(100px);
      opacity: 0;
      transition: all var(--transition-base);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--success);
    }

    .toast.error {
      border-color: var(--error);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .requests-table {
        display: block;
        overflow-x: auto;
      }

      .filter-tabs {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Particles Background -->
  <div class="particles" id="particles"></div>

  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <h2 class="login-title">Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-button" id="loginBtn">Login</button>
        <div class="error-message" id="loginError" style="display: none;"></div>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div class="admin-container" id="dashboard" style="display: none;">
    <!-- Header -->
    <header class="admin-header">
      <h1 class="admin-title">JcubHub Books Admin</h1>
      <div class="admin-actions">
        <span class="admin-user" id="adminUsername"></span>
        <button class="btn btn-primary" id="processAllBtn" title="Add all pending to Readarr">⚡ Process All</button>
        <button class="btn btn-secondary" id="completeAllBtn" title="Mark all in-progress as complete">✓ Complete All</button>
        <button class="btn btn-secondary" id="syncCwaBtn">🔄 Sync CWA</button>
        <a href="/" class="btn btn-secondary">View Site</a>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </header>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">-</div>
        <div class="stat-label">Total Requests</div>
      </div>
      <div class="stat-card" style="cursor: pointer;" id="pendingCard">
        <div class="stat-number" id="statPending">-</div>
        <div class="stat-label">⏳ Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statSearching">-</div>
        <div class="stat-label">🔍 Searching</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statCompleted">-</div>
        <div class="stat-label">✅ Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statRejected">-</div>
        <div class="stat-label">❌ Rejected</div>
      </div>
    </div>

    <!-- Readarr Queue Panel -->
    <section class="requests-section" id="readarrPanel" style="margin-bottom: 20px; display: none;">
      <div class="section-header">
        <h2 class="section-title">📥 Readarr Download Queue</h2>
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-secondary" id="testReadarrBtn" title="Test Readarr search with a sample book">🧪 Test Readarr</button>
          <button class="btn btn-secondary" id="refreshQueueBtn">Refresh</button>
        </div>
      </div>
      <div id="readarrQueueContent">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- Requests Section -->
    <section class="requests-section">
      <div class="section-header">
        <h2 class="section-title">Book Requests</h2>
        <div style="display: flex; align-items: center; gap: 15px;">
          <input type="text" id="searchInput" placeholder="Search books or authors..." 
            style="padding: 8px 16px; background: var(--bg-input); border: 1px solid var(--border-medium); 
            border-radius: var(--radius-md); color: var(--text-primary); width: 250px;">
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="">All</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="approved">Approved</button>
            <button class="filter-tab" data-filter="searching">Searching</button>
            <button class="filter-tab" data-filter="completed">Completed</button>
            <button class="filter-tab" data-filter="rejected">Rejected</button>
          </div>
        </div>
      </div>

      <div id="requestsContent">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- Request Detail Modal -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Request Details</h3>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Readarr Test Modal -->
  <div class="modal" id="readarrTestModal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3 class="modal-title">🧪 Readarr Diagnostics</h3>
        <button class="modal-close" id="readarrTestCloseBtn">&times;</button>
      </div>
      <div id="readarrTestBody">
        <div style="display: grid; gap: 15px; margin-bottom: 20px;">
          <div>
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Request ID (optional)</label>
            <input type="text" id="testRequestId" placeholder="e.g., BR-1776215148515-c2glmafd7" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary);">
          </div>
          <div>
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Book Title *</label>
            <input type="text" id="testTitle" placeholder="e.g., The Martian" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary);">
          </div>
          <div>
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Author *</label>
            <input type="text" id="testAuthor" placeholder="e.g., Andy Weir" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary);">
          </div>
          <div>
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">ISBN (optional)</label>
            <input type="text" id="testIsbn" placeholder="e.g., 978-0553418026" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary);">
          </div>
          <div>
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Requested Format</label>
            <select id="testFormat" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary);">
              <option value="any">Any</option>
              <option value="epub">EPUB</option>
              <option value="pdf">PDF</option>
              <option value="mobi">MOBI</option>
              <option value="audiobook">Audiobook</option>
            </select>
          </div>
          <label style="display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted);">
            <input type="checkbox" id="testAttemptAdd" style="width: 16px; height: 16px;">
            Attempt live add test (posts to Readarr and may add the book)
          </label>
          <button class="btn btn-primary" id="runReadarrTestBtn">🧪 Run Diagnostics</button>
        </div>
        <div id="readarrTestResults"></div>
      </div>
    </div>
  </div>

  <script>
    // State
    let authToken = localStorage.getItem('adminToken');
    let currentFilter = '';
    let searchQuery = '';
    let requests = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      if (authToken) {
        verifyToken();
      }

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          loadRequests();
        });
      });

      // Search input with debounce
      let searchTimeout;
      document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchQuery = e.target.value.toLowerCase();
          renderRequests();
        }, 300);
      });
    });

    // Particles
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    // API Calls
    async function apiCall(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };

      if (authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
      }

      const response = await fetch(url, { ...options, headers });
      
      if (response.status === 401 || response.status === 403) {
        logout();
        throw new Error('Session expired');
      }

      return response;
    }

    // Auth
    async function handleLogin(event) {
      event.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorDiv.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await response.json();

        if (response.ok) {
          authToken = data.token;
          localStorage.setItem('adminToken', authToken);
          showDashboard(data.username);
        } else {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = 'Connection error. Please try again.';
        errorDiv.style.display = 'block';
      }

      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }

    async function verifyToken() {
      try {
        const response = await apiCall('/api/auth/verify');
        if (response.ok) {
          const data = await response.json();
          showDashboard(data.user.username);
        } else {
          logout();
        }
      } catch {
        logout();
      }
    }

    function logout() {
      authToken = null;
      localStorage.removeItem('adminToken');
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard(username) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('adminUsername').textContent = username;
      loadStats();
      loadRequests();
    }

    // Load data
    async function loadStats() {
      try {
        const response = await apiCall('/api/admin/stats');
        const stats = await response.json();
        
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statPending').textContent = stats.pending;
        document.getElementById('statSearching').textContent = stats.searching || 0;
        document.getElementById('statCompleted').textContent = stats.completed;
        document.getElementById('statRejected').textContent = stats.rejected;

        // Show automation status
        if (stats.automation?.autoAddToReadarr) {
          showToast('🤖 Auto-add to Readarr is enabled', '');
        }

        // Load Readarr queue if configured
        loadReadarrQueue();
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    async function loadReadarrQueue() {
      const panel = document.getElementById('readarrPanel');
      const content = document.getElementById('readarrQueueContent');
      
      try {
        const response = await apiCall('/api/admin/readarr/queue');
        if (!response.ok) {
          panel.style.display = 'none';
          return;
        }
        
        const data = await response.json();
        panel.style.display = 'block';
        
        if (data.queueCount === 0 && data.recentDownloads.length === 0) {
          content.innerHTML = '<p style="color: var(--text-muted); padding: 20px; text-align: center;">No active downloads or recent completions</p>';
          return;
        }

        let html = '';
        
        if (data.queue.length > 0) {
          html += '<div style="margin-bottom: 15px;"><strong>Currently Downloading:</strong></div>';
          html += '<div style="display: flex; flex-wrap: wrap; gap: 10px;">';
          for (const item of data.queue) {
            const size = Number(item.size);
            const sizeLeft = Number(item.sizeleft);
            const hasSize = Number.isFinite(size) && Number.isFinite(sizeLeft) && size > 0;
            const progress = hasSize ? Math.round((1 - sizeLeft / size) * 100) : 0;
            html += `
              <div style="background: rgba(102, 126, 234, 0.1); padding: 12px 16px; border-radius: 8px; flex: 1; min-width: 250px;">
                <div style="font-weight: 600; margin-bottom: 5px;">${escapeHtml(item.title || 'Unknown')}</div>
                <div style="height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${progress}%; background: var(--gradient-primary);"></div>
                </div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">${progress}% - ${item.status || 'downloading'}</div>
              </div>

          }

        }
        
        if (data.recentDownloads.length > 0) {
          html += '<div style="margin: 20px 0 15px;"><strong>Recently Completed:</strong></div>';

            html += `<span style="background: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem;">✓ ${escapeHtml(item.sourceTitle || item.bookTitle || 'Book')}</span>`;

        panel.style.display = 'none';

    // Batch operations
    async function processAllPending() {
      if (!confirm('This will add ALL pending requests to Readarr. Continue?')) return;
      
      showToast('Processing all pending requests...', '');
      
      try {
        const response = await apiCall('/api/admin/batch/process-pending', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          showToast(`✅ ${result.message}`, 'success');
          if (result.errors?.length > 0) {
            console.log('Batch processing errors:', result.errors);
          }
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Batch processing failed', 'error');
        }
      } catch (error) {
        showToast('Failed to process pending requests', 'error');
      }
    }

      document.getElementById('testRequestId').value = '';
      document.getElementById('testTitle').value = '';
      document.getElementById('testAuthor').value = '';
      document.getElementById('testIsbn').value = '';
      document.getElementById('testFormat').value = 'any';
      document.getElementById('testAttemptAdd').checked = false;
      document.getElementById('readarrTestResults').innerHTML = `

    function closeReadarrTestModal() {

    async function runReadarrTest() {
      const requestId = document.getElementById('testRequestId').value.trim();
      const title = document.getElementById('testTitle').value.trim();
      const author = document.getElementById('testAuthor').value.trim();
      const isbn = document.getElementById('testIsbn').value.trim();
      const format = document.getElementById('testFormat').value;
      const attemptAdd = document.getElementById('testAttemptAdd').checked;
      
      if (!requestId && (!title || !author)) {
        showToast('Provide Request ID or Title + Author', 'error');
        return;
      }
      
      const resultsDiv = document.getElementById('readarrTestResults');
      resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const response = await apiCall('/api/admin/readarr/test', {
          method: 'POST',
          body: JSON.stringify({ requestId, title, author, isbn, format, attemptAdd })

        const result = await response.json();
        
        // Log to console for easy copying
        console.log('=== READARR TEST RESULTS ===');
        console.log(JSON.stringify(result, null, 2));
        
        if (!result.configured) {
          resultsDiv.innerHTML = `
            <div style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; padding: 20px; text-align: center;">

              <span style="color: #22c55e;">✅ Readarr v${result.readarrVersion}${result.readarrBranch ? ` (${escapeHtml(result.readarrBranch)})` : ''} connected</span>

            </div>
            <div style="margin-top: 10px; font-size: 12px; color: var(--text-muted);">
              Total results: ${result.totalResults} | Showing top ${result.results.length}

            <div style="margin-top: 8px; font-size: 12px; color: var(--text-muted);">
              Format: ${escapeHtml(result.searchTerms?.format || 'any')} |

              Metadata Profile: ${escapeHtml(result.diagnostics?.selectedProfiles?.metadataProfileName || String(result.diagnostics?.selectedProfiles?.metadataProfileId || 'n/a'))}

            <div style="text-align: center; padding: 40px; color: var(--text-muted);">

          });
          
          html += `</div>`;
        }

        if (result.payloadPreview) {
          html += `
            <div style="margin-top: 15px; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; padding: 15px;">
              <div style="font-weight: 600; margin-bottom: 10px;">Payload Preview</div>

                <div>Root Folder: ${escapeHtml(result.payloadPreview.rootFolderPath || 'n/a')}</div>
                <div>Likely Audiobook: ${result.payloadPreview.likelyAudiobook ? 'yes' : 'no'} | Stripped Audio Hints: ${result.payloadPreview.strippedAudiobookHints ? 'yes' : 'no'}</div>

        if (result.addAttempt?.attempted) {

          html += `
            <div style="margin-top: 15px; background: ${addOk ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.15)'}; border: 1px solid ${addOk ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)'}; border-radius: 12px; padding: 15px;">

        html += `

    function copyReadarrResults() {
      if (window.lastReadarrTestResult) {
        navigator.clipboard.writeText(JSON.stringify(window.lastReadarrTestResult, null, 2))
          .then(() => showToast('Results copied to clipboard!', 'success'))

    async function completeAllInProgress() {
      if (!confirm('This will mark ALL searching/downloading requests as completed and notify users. Continue?')) return;
      
      showToast('Completing all in-progress requests...', '');
      
      try {
        const response = await apiCall('/api/admin/batch/complete-all', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          showToast(`✅ Completed ${result.completed} requests`, 'success');
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Batch complete failed', 'error');
        }
      } catch (error) {
        showToast('Failed to complete requests', 'error');
      }
    }

    async function loadRequests() {
      const container = document.getElementById('requestsContent');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        const url = currentFilter 
          ? `/api/admin/requests?status=${currentFilter}`
          : '/api/admin/requests';
        
        const response = await apiCall(url);
        const data = await response.json();
        requests = data.requests;
        renderRequests();
      } catch (error) {
        container.innerHTML = `
          <div class="empty-state">
            <p style="color: var(--error);">Failed to load requests</p>
          </div>
        `;
      }
    }

    function renderRequests() {
      const container = document.getElementById('requestsContent');
      
      // Filter by search query
      let filteredRequests = requests;
      if (searchQuery) {
        filteredRequests = requests.filter(req => 
          req.book_title.toLowerCase().includes(searchQuery) ||
          req.author.toLowerCase().includes(searchQuery) ||
          req.requester_name.toLowerCase().includes(searchQuery) ||
          req.requester_email.toLowerCase().includes(searchQuery)
        );
      }

      if (filteredRequests.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <p>${searchQuery ? 'No matching requests' : 'No requests found'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <table class="requests-table">
          <thead>
            <tr>
              <th>Book</th>
              <th>Requester</th>
              <th>Format</th>
              <th>Status</th>
              <th>CWA</th>
              <th>Date</th>
              <th>Quick Actions</th>
            </tr>
          </thead>
          <tbody>
            ${filteredRequests.map(req => `
              <tr>
                <td>
                  <strong>${escapeHtml(req.book_title)}</strong><br>
                  <span style="color: var(--text-muted); font-size: 0.9rem;">by ${escapeHtml(req.author)}</span>
                  ${req.isbn ? `<br><span style="color: var(--primary); font-size: 0.8rem;">ISBN: ${escapeHtml(req.isbn)}</span>` : ''}
                </td>
                <td>
                  ${escapeHtml(req.requester_name)}<br>
                  <span style="color: var(--text-muted); font-size: 0.85rem;">${escapeHtml(req.requester_email)}</span>
                </td>
                <td style="text-transform: uppercase;">${req.format}</td>
                <td><span class="status-badge status-${req.status}">${req.status}</span></td>
                <td>
                  <span class="cwa-badge ${req.cwa_available ? '' : 'unavailable'}">
                    ${req.cwa_available ? '✓ Available' : '✗ Not found'}
                  </span>
                </td>
                <td>${formatDate(req.created_at)}</td>
                <td>
                  ${getQuickActions(req)}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function getQuickActions(req) {
      const actions = [];
      
      // View details always available
      actions.push(`<button class="action-btn" data-action="view" data-id="${req.id}" title="View Details">👁️</button>`);
      
      // Readarr link if available
      if (req.readarr_url) {
        actions.push(`<a href="${req.readarr_url}" target="_blank" class="action-btn" title="Search in Readarr">🔍</a>`);
      }
      
      // Status-specific quick actions
      if (req.status === 'pending') {
        // Approve & Add to Readarr (one click)
        actions.push(`<button class="action-btn primary" data-action="approve-add" data-id="${req.id}" title="Approve & Add to Readarr">✓ Add</button>`);
        // Quick reject
        actions.push(`<button class="action-btn" data-action="quick-reject" data-id="${req.id}" title="Reject" style="color: #ef4444;">✗</button>`);
      } else if (req.status === 'approved') {
        // Add to Readarr if not already searching
        actions.push(`<button class="action-btn primary" data-action="add-readarr" data-id="${req.id}" title="Add to Readarr">📥 Readarr</button>`);
      } else if (req.status === 'searching' || req.status === 'downloading') {
        // Mark as completed
        actions.push(`<button class="action-btn" data-action="quick-complete" data-id="${req.id}" title="Mark Completed" style="color: #22c55e;">✓ Done</button>`);
      }
      
      // Delete button for all
      actions.push(`<button class="action-btn" data-action="delete" data-id="${req.id}" title="Delete" style="color: #ef4444; opacity: 0.6;">🗑️</button>`);
      
      return actions.join('');
    }

                <span class="history-time">${formatDateTime(sub.created_at)}</span>
                <span class="history-status">
                  <span>${escapeHtml(sub.subscriber_name)} (${escapeHtml(sub.subscriber_email)})</span>
                  ${sub.notify_on_complete ? '<span style="color: #22c55e; margin-left: 10px;">notify</span>' : '<span style="color: var(--text-muted); margin-left: 10px;">silent</span>'}
                </span>
              </div>
            `).join('') : `<div class="history-item"><span class="history-status" style="color: var(--text-muted);">No subscribers</span></div>`}
          </div>

          <div class="history-list" style="margin-top: 20px;">
            <h4 style="margin-bottom: 15px;">Status History</h4>
            ${req.statusHistory.map(h => `
              <div class="history-item">
                <span class="history-time">${formatDateTime(h.changed_at)}</span>
                <span class="history-status">
                  <span class="status-badge status-${h.status}">${h.status}</span>
                  ${h.notes ? `<span style="color: var(--text-muted); margin-left: 10px;">${escapeHtml(h.notes)}</span>` : ''}
                </span>
              </div>
            `).join('')}
          </div>
        `;
      } catch (error) {
        modalBody.innerHTML = '<p style="color: var(--error);">Failed to load request details</p>';
      }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    async function updateStatus(id) {
      const status = document.getElementById('statusSelect').value;
      const notes = document.getElementById('statusNotes').value;

      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status, notes })
        });

        if (response.ok) {
          showToast('Status updated successfully', 'success');
          closeModal();
          loadRequests();
          loadStats();
        } else {
          showToast('Failed to update status', 'error');
        }
      } catch (error) {
        showToast('Failed to update status', 'error');
      }
    }

    async function addToReadarr(id) {
      showToast('Adding to Readarr...', '');
      
      try {
        const response = await apiCall('/api/admin/readarr/add', {
          method: 'POST',
          body: JSON.stringify({ requestId: id })
        });

        const result = await response.json();
        
        if (result.success) {
          showToast(result.alreadyTracked ? 'Request already tracked in Readarr' : 'Book added to Readarr', 'success');
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Failed to add to Readarr', 'error');
        }
      } catch (error) {
        showToast('Failed to add to Readarr', 'error');
      }
    }

    // Force add to Readarr (bypass CWA check)
    async function forceAddToReadarr(id) {
      if (!confirm('This will add the book to Readarr regardless of CWA availability. Continue?')) return;
      
      showToast('Force adding to Readarr...', '');
      
      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ 
            status: 'approved', 
            addToReadarr: true,
            notes: 'Force add requested by admin'
          })
        });

        const result = await response.json();
        
        if (response.ok) {
          if (result.readarrResult?.success) {
            showToast('Force added to Readarr successfully!', 'success');
            closeModal();
          } else {
            showToast('Failed to add to Readarr: ' + (result.readarrResult?.error || 'Unknown error'), 'error');
          }
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Failed to force add', 'error');
        }
      } catch (error) {
        showToast('Failed to force add to Readarr', 'error');
      }
    }

    // Quick action: Approve and add to Readarr in one click
    async function approveAndAdd(id) {
      showToast('Approving and adding to Readarr...', '');
      
      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ 
            status: 'approved', 
            addToReadarr: true,
            notes: 'Approved and sent to Readarr'
          })
        });

        const result = await response.json();
        
        if (response.ok) {
          if (result.readarrResult?.success) {
            showToast('Approved and added to Readarr!', 'success');
          } else {
            showToast('Approved, but Readarr add failed: ' + (result.readarrResult?.error || 'Unknown error'), 'error');
          }
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Failed to approve', 'error');
        }
      } catch (error) {
        showToast('Failed to approve', 'error');
      }
    }

    // Quick action: Reject request
    async function quickReject(id) {
      if (!confirm('Are you sure you want to reject this request?')) return;
      
      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'rejected', notes: 'Quick rejected by admin' })
        });

        if (response.ok) {
          showToast('Request rejected', 'success');
          loadRequests();
          loadStats();
        } else {
          showToast('Failed to reject', 'error');
        }
      } catch (error) {
        showToast('Failed to reject', 'error');
      }
    }

    // Quick action: Mark as completed
    async function quickComplete(id) {
      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'completed', notes: 'Marked complete by admin' })
        });

        if (response.ok) {
          showToast('Marked as completed! User notified.', 'success');
          loadRequests();
          loadStats();
        } else {
          showToast('Failed to complete', 'error');
        }
      } catch (error) {
        showToast('Failed to complete', 'error');
      }
    }

    // Delete request
    async function deleteRequest(id) {
      if (!confirm('Are you sure you want to delete this request? This cannot be undone.')) return;
      
      try {
        const response = await apiCall(`/api/admin/requests/${id}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showToast('Request deleted', 'success');
          loadRequests();
          loadStats();
        } else {
          showToast('Failed to delete', 'error');
        }
      } catch (error) {
        showToast('Failed to delete', 'error');
      }
    }

    async function syncCwa() {
      showToast('Syncing with CWA...', '');
      
      try {
        const response = await apiCall('/api/admin/sync-cwa', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          showToast(`Synced ${result.checkedCount} requests, ${result.updatedCount} updated`, 'success');
          loadRequests();
          loadStats();
        } else {
          showToast(result.error || 'Sync failed', 'error');
        }
      } catch (error) {
        showToast('Sync failed', 'error');
      }
    }

    // Utilities
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString();
    }

    function formatDateTime(dateStr) {
      return new Date(dateStr).toLocaleString();
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      if (type) toast.classList.add(type);
      
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        closeReadarrTestModal();
      }
    });

    // Close modal on backdrop click
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) closeModal();
    });
    
    document.getElementById('readarrTestModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) closeReadarrTestModal();
    });

    // ============================================
    // Event Listeners (CSP-compliant)
    // ============================================

    // Login form
    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    // Header buttons
    document.getElementById('processAllBtn').addEventListener('click', processAllPending);
    document.getElementById('completeAllBtn').addEventListener('click', completeAllInProgress);
    document.getElementById('syncCwaBtn').addEventListener('click', syncCwa);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('refreshQueueBtn')?.addEventListener('click', loadReadarrQueue);
    document.getElementById('testReadarrBtn')?.addEventListener('click', testReadarr);
    document.getElementById('readarrTestCloseBtn')?.addEventListener('click', closeReadarrTestModal);
    document.getElementById('runReadarrTestBtn')?.addEventListener('click', runReadarrTest);
    
    // Enter key in test modal
    document.getElementById('testIsbn')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') runReadarrTest();
    });
    
    // Quick filter by clicking on pending stat
    document.getElementById('pendingCard')?.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-filter="pending"]').classList.add('active');
      currentFilter = 'pending';
      loadRequests();
    });

    // Event delegation for dynamic buttons
    document.addEventListener('click', (e) => {
      const target = e.target;
      
      // Handle action buttons in requests table
      if (target.matches('[data-action="view"]')) {
        viewDetails(target.dataset.id);
      } else if (target.matches('[data-action="add-readarr"]')) {
        addToReadarr(target.dataset.id);
      } else if (target.matches('[data-action="approve-add"]')) {
        approveAndAdd(target.dataset.id);
      } else if (target.matches('[data-action="quick-reject"]')) {
        quickReject(target.dataset.id);
      } else if (target.matches('[data-action="quick-complete"]')) {
        quickComplete(target.dataset.id);
      } else if (target.matches('[data-action="delete"]')) {
        deleteRequest(target.dataset.id);
      } else if (target.matches('[data-action="force-readarr"]')) {
        forceAddToReadarr(target.dataset.id);
      } else if (target.matches('#updateStatusBtn')) {
        updateStatus(target.dataset.id);
      }
    });
  </script>
</body>
</html>
