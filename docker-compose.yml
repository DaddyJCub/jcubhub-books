version: '3.8'

services:
  frontend:
    image: nginx:alpine
    container_name: jcubhub-books-frontend
    ports:
      - "3003:3003"
    volumes:
      - ./books-landing-page:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jcubhub-books-backend
    ports:
      - "3002:3002"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: unless-stopped